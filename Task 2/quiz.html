<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    .container {
      max-width: 600px;
      margin-top: 60px;
    }

    .option {
      cursor: pointer;
      transition: 0.3s;
    }

    .option:hover {
      background: #e9ecef;
    }

    .correct {
      background-color: #28a745 !important;
      color: white;
    }

    .wrong {
      background-color: #dc3545 !important;
      color: white;
    }
  </style>
</head>

<body>

<div class="container text-center">
  <h2 class="mb-3">Quiz App</h2>
  <h5 id="timer" class="text-danger">Time: 10</h5>

  <div id="quizBox" class="card p-4 shadow">
    <h5 id="question"></h5>
    <div id="options" class="mt-3"></div>
    <button class="btn btn-primary mt-3" onclick="nextQuestion()">Next</button>
  </div>

  <div id="resultBox" class="card p-4 shadow d-none">
    <h3>Your Score: <span id="score"></span></h3>
    <button class="btn btn-success mt-3" onclick="restartQuiz()">Restart</button>
  </div>
</div>

<script>
let quiz = [
  {
    question: "Which company developed Java?",
    options: ["Microsoft", "Sun Microsystems", "Google"],
    answer: 1
  },
  {
    question: "What does CSS stand for?",
    options: ["Computer Style Sheets", "Cascading Style Sheets", "Creative Style System"],
    answer: 1
  },
  {
    question: "Which HTML tag is used for inserting an image?",
    options: ["<img>", "<image>", "<pic>"],
    answer: 0
  },
  {
    question: "Which keyword is used to declare a variable in JavaScript?",
    options: ["int", "var", "string"],
    answer: 1
  },
  {
    question: "Which data structure uses FIFO?",
    options: ["Stack", "Queue", "Tree"],
    answer: 1
  },
  {
    question: "Which symbol is used for comments in JavaScript?",
    options: ["//", "<!-- -->", "#"],
    answer: 0
  },
  {
    question: "Which company developed Python?",
    options: ["Google", "Microsoft", "None of the above"],
    answer: 2
  },
  {
    question: "What does HTTP stand for?",
    options: ["HyperText Transfer Protocol", "High Transfer Text Protocol", "Hyper Transfer Text Process"],
    answer: 0
  }
];

let currentQ = 0;
let score = 0;
let selected = null;
let timer;
let timeLeft = 10;

// Shuffle questions
quiz.sort(() => Math.random() - 0.5);

function loadQuestion() {
  resetTimer();

  let q = quiz[currentQ];
  document.getElementById("question").innerText = q.question;

  let optionsHTML = "";
  q.options.forEach((opt, index) => {
    optionsHTML += `
      <div class="option p-2 border mb-2" onclick="selectOption(${index}, this)">
        ${opt.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
      </div>
    `;
  });

  document.getElementById("options").innerHTML = optionsHTML;
}

function selectOption(index, element) {
  if (selected !== null) return;

  selected = index;
  let correctIndex = quiz[currentQ].answer;
  let options = document.querySelectorAll(".option");

  options.forEach((opt, i) => {
    if (i === correctIndex) opt.classList.add("correct");
    if (i === selected && i !== correctIndex) opt.classList.add("wrong");
  });

  if (selected === correctIndex) score++;
  clearInterval(timer);
}

function nextQuestion() {
  if (selected === null) return;

  currentQ++;
  selected = null;

  if (currentQ < quiz.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quizBox").classList.add("d-none");
  document.getElementById("resultBox").classList.remove("d-none");
  document.getElementById("score").innerText = score + "/" + quiz.length;
}

function restartQuiz() {
  currentQ = 0;
  score = 0;
  selected = null;
  quiz.sort(() => Math.random() - 0.5);

  document.getElementById("resultBox").classList.add("d-none");
  document.getElementById("quizBox").classList.remove("d-none");

  loadQuestion();
}

function resetTimer() {
  clearInterval(timer);
  timeLeft = 10;
  document.getElementById("timer").innerText = "Time: " + timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "Time: " + timeLeft;

    if (timeLeft === 0) {
      clearInterval(timer);
      nextQuestion();
    }
  }, 1000);
}

loadQuestion();
</script>

</body>
</html>
